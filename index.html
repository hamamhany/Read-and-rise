<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>منصة تعليمية</title>
    
    <!-- تم إزالة manifest و service worker لتفادي الأخطاء -->
    
    <style>
      /* ===== التصميم الزجاجي العصري ===== */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', sans-serif;
        background: #0f0e1a;
        min-height: 100vh;
        color: #fff;
        overflow-x: hidden;
      }
      .glass {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .glass-glow {
        background: rgba(108, 99, 255, 0.12);
        backdrop-filter: blur(20px) saturate(200%);
        border: 1px solid rgba(108, 99, 255, 0.25);
        box-shadow: 0 0 40px rgba(108, 99, 255, 0.15);
      }
      .btn-primary {
        background: linear-gradient(135deg, #6c63ff, #8b7bff);
        border: none;
        padding: 12px 28px;
        border-radius: 50px;
        font-weight: 600;
        color: #fff;
        transition: all 0.3s ease;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
      }
      .btn-primary:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 8px 30px rgba(108, 99, 255, 0.6);
      }
      .input-glass {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 14px 18px;
        color: #fff;
        outline: none;
        width: 100%;
        transition: border 0.3s;
      }
      .input-glass:focus {
        border-color: #6c63ff;
        box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.2);
      }
      .container-center {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .bg-gradient-programming {
        background: linear-gradient(135deg, #0f0e1a 0%, #1a1a3e 40%, #2d1b69 70%, #0f0e1a 100%);
        background-size: 400% 400%;
        animation: gradientShift 12s ease infinite;
      }
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
